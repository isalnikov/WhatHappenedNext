spring:
  application:
    name: WhatHappenedNext
  
  # H2 Database configuration for development
  datasource:
    url: jdbc:h2:file:./data/whathappenednext;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

# Production profile with PostgreSQL
---
spring:
  config:
    activate:
      on-profile: prod
  
  datasource:
    url: jdbc:postgresql://localhost:5432/whathappenednext
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Telegram Bot Configuration
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    username: ${TELEGRAM_BOT_USERNAME}

# Qwen CLI Configuration
app:
  qwen:
    command: ${QWEN_COMMAND:qwen}
  parser:
    timeout-ms: ${PARSER_TIMEOUT_MS:30000}
    max-items: ${PARSER_MAX_ITEMS:100}

# Scheduler Configuration
app:
  scheduler:
    enabled: ${SCHEDULER_ENABLED:true}
    cron: ${SCHEDULER_CRON:0 0 */6 * * *}

# Server Configuration
server:
  port: ${SERVER_PORT:8080}

# Logging Configuration
logging:
  level:
    root: INFO
    com.whathappenednext: DEBUG
    org.springframework: WARN
    org.telegram: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/whathappenednext.log

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
