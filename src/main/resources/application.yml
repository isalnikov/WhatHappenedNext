spring:
  application:
    name: ai-web-agent-bot
  
  # H2 Database configuration for development
  datasource:
    url: jdbc:h2:file:./data/ai_web_agent_db;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
    username: sa
    password: ${H2_PASSWORD:secure_password}
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  flyway:
    enabled: false

# Production profile with PostgreSQL
---
spring:
  config:
    activate:
      on-profile: prod
  
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_web_agent
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  flyway:
    enabled: true
    locations: classpath:db/migration

# Telegram Bot Configuration
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    username: ${TELEGRAM_BOT_USERNAME}

# Qwen CLI Configuration
qwen:
  cli:
    path: ${QWEN_CLI_PATH:qwen}
    timeout-seconds: ${QWEN_TIMEOUT_SECONDS:300}
    max-retries: ${QWEN_MAX_RETRIES:3}

# Scheduler Configuration
scheduler:
  parsing:
    cron: "0 */15 * * * *"  # Every 15 minutes
  analysis:
    cron: "0 0 */2 * * *"   # Every 2 hours

# Server Configuration
server:
  port: ${SERVER_PORT:8080}

# Logging Configuration
logging:
  level:
    root: INFO
    com.example.aiwebagent: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
